<div class="relative w-full h-screen bg-black overflow-hidden font-sans">
  <div class="absolute inset-0 z-0 pointer-events-none opacity-[0.05]"
    style="background-image: url('assets/images/noise.jpg'); background-repeat: repeat;"></div>
  <div class="flex h-full w-full transition-transform duration-700 ease-in-out"
    [style.transform]="'translateX(-' + currentIndex * 100 + 'vw)'">
    <ng-container *ngFor="let page of pages; let i = index">
      <section class="min-w-[100vw] h-full p-10 px-30 flex flex-col relative overflow-hidden">
        <div class="flex-grow mt-8 relative">
          <ng-container *ngIf="i === 0">
            <app-home-page [page]="page"></app-home-page>
          </ng-container>
          <ng-container *ngIf="i === 1">
            <app-about-page [page]="page"></app-about-page>
          </ng-container>
          <ng-container *ngIf="i === 2">
            <app-projects-page [page]="page" (openModal)="openModal($event)"></app-projects-page>
          </ng-container>
          <ng-container *ngIf="i === 3">
            <app-skills-page [page]="page"></app-skills-page>
          </ng-container>
        </div>
      </section>
    </ng-container>
  </div>
  <div
    class="absolute bottom-12 left-0 w-full px-8 md:px-16 z-999 flex items-center justify-between pointer-events-none">
    <div class="pointer-events-auto z-999 flex">
      <p-select class="!bg-zinc-900/80 !text-gray-400 !border !border-white/20 !p-3" [options]="languages"
        [(ngModel)]="selectedLang" optionLabel="name" (onChange)="onLangChange($event)">
        <ng-template pTemplate="selectedItem">
          <div class="flex items-center gap-2" *ngIf="selectedLang">
            <img [src]="selectedLang.flag" style="width: 32px" />
          </div>
        </ng-template>
        <ng-template let-lang pTemplate="item">
          <div class="flex items-center gap-2 !bg-zinc-900/80 !text-gray-400 !border !border-white/20">
            <img [src]="lang.flag" style="width: 32px" />
          </div>
        </ng-template>
      </p-select>
    </div>
    <div class="flex items-center justify-center gap-8">
      <div class="flex gap-4 pointer-events-auto shadow-2xl">
        <button *ngFor="let page of pages; let i = index" (click)="goToPage(i)" [ngClass]="{
          'bg-white text-black font-extrabold shadow-[0_0_20px_rgba(255,255,255,0.5)] scale-110': currentIndex === i,
          'bg-zinc-900/80 text-gray-400 border border-white/20 hover:border-white/60 hover:text-white backdrop-blur-sm': currentIndex !== i
        }"
          class="w-22 h-22 flex items-center justify-center transition-all duration-300 text-3xl font-medium rounded-sm">
          {{ page.id }}
        </button>
      </div>
    </div>
  </div>
  <div *ngIf="selectedProject !== null" class="fixed inset-0 z-[9999] flex items-center justify-center">
    <div class="absolute inset-0 backdrop-blur-sm cursor-pointer" (click)="closeModal()"></div>
    <div class="relative w-[85vw] h-[85vh] bg-[#0c0c0c] border border-white/10 rounded-xl shadow-2xl flex flex-col md:flex-row overflow-hidden animate-[fadeIn_0.2s_ease-out]">
      <button (click)="closeModal()"
        class="absolute top-6 right-6 z-50 text-white bg-white/5 hover:bg-amber-500 hover:text-black p-3 rounded-full transition-all duration-300 hover:rotate-90">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
      <div
        class="w-full md:w-[35%] h-[50vh] md:h-full border-b md:border-b-0 md:border-r border-white/10 flex flex-col bg-[#0f0f0f]">
        <div class="h-[40%] w-full bg-neutral-900 relative overflow-hidden group">
          <img [src]="selectedProject.images[0]" [alt]="selectedProject.title"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
          <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] to-transparent"></div>
        </div>
        <div class="h-[60%] p-12 flex flex-col justify-between overflow-y-auto custom-scrollbar">
          <div>
            <h5 class="text-4xl font-bold uppercase tracking-widest text-neutral-500 mb-4">Navigation</h5>
            <nav class="flex flex-col gap-2">
              <a *ngFor="let sec of selectedProject.sections" [href]="'#' + sec.id"
                class="text-neutral-400 hover:text-amber-500 text-2xl font-medium transition-colors duration-200 flex items-center gap-2 group">
                <span class="w-3 h-1.5 rounded-full bg-neutral-600 group-hover:bg-amber-500 transition-all"></span>
                {{ sec.title }}
              </a>
            </nav>
          </div>
          <div class="mt-6 pt-6 border-t border-white/5">
            <h5 class="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-3">Architecture & Technos</h5>
            <p-meterGroup [value]="selectedProject.techMetrics" labelPosition="end"
              textColor="text-neutral-400"></p-meterGroup>
          </div>
        </div>
      </div>
      <div
        class="w-full md:w-[65%] h-[50vh] md:h-full p-8 md:p-16 overflow-y-auto scroll-smooth custom-scrollbar flex flex-col justify-between">
        <div>
          <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <div>
              <h4 class="text-amber-500 tracking-widest uppercase text-xs font-semibold">{{ selectedProject.subtitle }}
              </h4>
              <h2 class="text-4xl md:text-5xl font-bold text-white mt-1">{{ selectedProject.title }}</h2>
            </div>

            <div class="flex items-center gap-3" *ngIf="selectedProject.repoUrl">
              <a [href]="selectedProject.repoUrl" target="_blank"
                class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 text-white text-sm font-medium rounded-lg border border-white/10 transition-all">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path fill-rule="evenodd"
                    d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                    clip-rule="evenodd" />
                </svg>
                Repository Code
              </a>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-4 p-4 bg-white/5 rounded-xl border border-white/5 mb-10 text-sm">
            <div>
              <span class="block text-neutral-500 text-xs uppercase font-medium">Rôle</span>
              <span class="text-neutral-200 font-semibold">{{ selectedProject.role }}</span>
            </div>
            <div>
              <span class="block text-neutral-500 text-xs uppercase font-medium">Année</span>
              <span class="text-neutral-200 font-semibold">{{ selectedProject.year }}</span>
            </div>
            <div>
              <span class="block text-neutral-500 text-xs uppercase font-medium">Livrable</span>
              <span class="text-neutral-200 font-semibold">Production</span>
            </div>
          </div>
          <div class="space-y-16 content-sections mt-8">
            <section *ngFor="let sec of selectedProject.sections" [id]="sec.id" class="pt-4">
              <h3 class="text-2xl font-bold text-white border-b border-white/10 pb-3 mb-6 flex items-center gap-3">
                <span class="text-amber-500 font-mono text-lg">//</span> {{ sec.title }}
              </h3>

              <p class="text-neutral-400 text-lg md:text-xl leading-loose whitespace-pre-line mb-6">
                {{ sec.content }}
              </p>

              <div *ngIf="sec.images && sec.images.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                <div *ngFor="let imgUrl of sec.images" class="overflow-hidden rounded-lg border border-white/10 bg-neutral-900/50 p-2">
                  <img [src]="imgUrl" alt="Illustration de la section" class="w-full h-auto object-cover rounded-md hover:scale-[1.02] transition-transform duration-300">
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>
